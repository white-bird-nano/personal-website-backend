quarkus.http.port=8080

# CORS設定（フロントエンドからのリクエストを許可）
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# ログレベル
quarkus.log.level=INFO

# Container Image (Jib) 設定
# NOTE: Artifact Registry のパスに合わせて変更してください
# 例: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY_NAME/IMAGE_NAME
quarkus.container-image.build=true
# quarkus.container-image.registry=asia-northeast1-docker.pkg.dev
# quarkus.container-image.group=my-project/my-repo
# quarkus.container-image.name=personal-website-backend
# quarkus.container-image.tag=latest
